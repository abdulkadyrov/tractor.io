<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tractor Calc</title>

<!-- PWA -->
<link rel="manifest" href="data:application/json,{
  'name':'Tractor Calc',
  'short_name':'Tractor',
  'start_url':'.',
  'display':'standalone',
  'background_color':'#111',
  'theme_color':'#111'
}">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: #fff;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1c1c1e;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

label {
  font-size: 13px;
  color: #aaa;
  display: block;
  margin-top: 10px;
}

input, select {
  width: 100%;
  margin-top: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2c2c2e;
  color: #fff;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
}

.calc-btn {
  background: #30d158;
  color: #000;
}

.share-btn {
  background: #0a84ff;
}

.result {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}

.small {
  font-size: 13px;
  color: #888;
  margin-top: 5px;
  text-align: center;
}
</style>
</head>

<body>

<div class="app">

  <h1>🚜 Калькулятор</h1>

  <div class="card">
    <label>Тип</label>
    <select id="type" onchange="toggle()">
      <option value="parnik">Парник</option>
      <option value="ogorod">Огород</option>
    </select>

    <label>Длина (м)</label>
    <input type="number" id="length" value="25">

    <label>Ширина (м)</label>
    <input type="number" id="width" value="8">

    <div id="parnik">
      <label>Полоски</label>
      <input type="number" id="lines" value="1">

      <label>Сложность</label>
      <select id="difficulty">
        <option value="1">Лёгкий</option>
        <option value="1.3">Средний</option>
        <option value="1.6">Сложный</option>
      </select>
    </div>

    <button class="calc-btn" onclick="calc()">Рассчитать</button>
  </div>

  <div class="card">
    <div class="result" id="result">0 руб</div>
    <div class="small" id="details"></div>

    <button class="share-btn" onclick="share()">Поделиться</button>
  </div>

</div>

<script>
let lastText = "";

function toggle() {
  const type = document.getElementById("type").value;
  document.getElementById("parnik").style.display =
    type === "parnik" ? "block" : "none";
}

function calc() {
  const type = document.getElementById("type").value;
  const length = +document.getElementById("length").value || 0;
  const width = +document.getElementById("width").value || 0;

  const area = length * width;
  const sotki = area / 100;

  let total = 0;

  if (type === "parnik") {
    const lines = +document.getElementById("lines").value || 1;
    const diff = +document.getElementById("difficulty").value;

    const base = 2000;
    const standard = 25 * 8;

    total = base * (area / standard) * diff;

    if (total < 2000) total = 2000;

    total *= lines;

  } else {
    if (sotki < 3) total = 2000;
    else total = sotki * 750;
  }

  const text = `Площадь: ${area.toFixed(1)} м² (${sotki.toFixed(2)} соток)
Стоимость: ${Math.round(total)} руб`;

  lastText = text;

  document.getElementById("result").innerText =
    Math.round(total) + " руб";

  document.getElementById("details").innerText = text;
}

function share() {
  if (navigator.share) {
    navigator.share({
      title: "Расчёт трактора",
      text: lastText
    });
  } else {
    navigator.clipboard.writeText(lastText);
    alert("Скопировано!");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tractor Calc PRO</title>

<style>
body {
  font-family: sans-serif;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}
.app { max-width: 420px; margin: auto; }

.card {
  background: #1c1c1e;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #2c2c2e;
  color: #fff;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
  cursor: pointer;
}

.main { background: #30d158; color: #000; }
.share { background: #0a84ff; }

.toggle-btn {
  background: #2c2c2e;
}
.toggle-btn.active {
  background: #ff9f0a;
  color: #000;
}

.switch {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.switch button {
  flex: 1;
}

.result {
  text-align: center;
  font-size: 24px;
}

.small {
  text-align: center;
  font-size: 13px;
  color: #888;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <h2>🚜 Калькулятор</h2>

  <label>Тип работы</label>
  <select id="type" onchange="toggleType()">
    <option value="ogorod">Огород</option>
    <option value="parnik">Парник</option>
  </select>

  <label>Населённый пункт</label>
  <select id="city">
    <option value="5000">Грозный</option>
    <option value="5000">Гудермес</option>
    <option value="3500">Курчалой</option>
    <option value="4000">Шали</option>
    <option value="3000">Автуры</option>
    <option value="4000">Джалка</option>
    <option value="4000">Аргун</option>
    <option value="6000">Урус-Мартан</option>
    <option value="8000">Ачхой-Мартан</option>
    <option value="5000">Старые Атаги</option>
    <option value="4000">Новые Атаги</option>
    <option value="4000">Бачи-Юрт</option>
  </select>

  <label>Способ расчёта</label>
  <div class="switch">
    <button id="btnSize" class="toggle-btn active" onclick="setMode('size')">Длина × ширина</button>
    <button id="btnSotki" class="toggle-btn" onclick="setMode('sotki')">Сотки</button>
  </div>

  <div id="sizeBlock">
    <label>Длина (м)</label>
    <input type="number" id="length">

    <label>Ширина (м)</label>
    <input type="number" id="width">
  </div>

  <div id="sotkiBlock" style="display:none;">
    <label>Сотки</label>
    <input type="number" id="sotki">
  </div>

  <!-- Парник -->
  <div id="parnikBlock" style="display:none;">
    <label>Полоски</label>
    <input type="number" id="lines" value="1">

    <label>Сложность</label>
    <select id="difficulty">
      <option value="1">Лёгкий</option>
      <option value="1.3">Средний</option>
      <option value="1.6">Сложный</option>
    </select>
  </div>

  <!-- Заправка -->
  <button id="fuelBtn" class="toggle-btn" onclick="toggleFuel()">⛽ Заправка</button>

  <button class="main" onclick="calc()">Рассчитать</button>
</div>

<div class="card">
  <div class="result" id="result">0 руб</div>
  <div class="small" id="details"></div>

  <button class="share" onclick="share()">Поделиться</button>
</div>

</div>

<script>
let mode = "size";
let fuel = false;
let lastText = "";

function setMode(m) {
  mode = m;

  document.getElementById("sizeBlock").style.display =
    m === "size" ? "block" : "none";
  document.getElementById("sotkiBlock").style.display =
    m === "sotki" ? "block" : "none";

  document.getElementById("btnSize").classList.toggle("active", m === "size");
  document.getElementById("btnSotki").classList.toggle("active", m === "sotki");
}

function toggleType() {
  const type = document.getElementById("type").value;
  document.getElementById("parnikBlock").style.display =
    type === "parnik" ? "block" : "none";
}

function toggleFuel() {
  fuel = !fuel;
  document.getElementById("fuelBtn").classList.toggle("active", fuel);
}

function getSotki() {
  if (mode === "size") {
    const l = +document.getElementById("length").value || 0;
    const w = +document.getElementById("width").value || 0;
    return (l * w) / 100;
  } else {
    return +document.getElementById("sotki").value || 0;
  }
}

function calc() {
  const type = document.getElementById("type").value;
  const minPrice = +document.getElementById("city").value;

  const sotki = getSotki();
  let total = 0;

  if (type === "ogorod") {
    if (sotki <= 3) total = minPrice;
    else total = sotki * 1000;
  } else {
    const lines = +document.getElementById("lines").value || 1;
    const diff = +document.getElementById("difficulty").value;

    const base = 2000;
    const standard = 25 * 8;
    const area = sotki * 100;

    total = base * (area / standard) * diff;

    if (total < 2000) total = 2000;

    total *= lines;
  }

  // заправка вручную
  if (fuel) total += 2000;

  const text = `Сотки: ${sotki.toFixed(2)}
Стоимость: ${Math.round(total)} руб`;

  lastText = text;

  document.getElementById("result").innerText =
    Math.round(total) + " руб";

  document.getElementById("details").innerText = text;
}

function share() {
  if (navigator.share) {
    navigator.share({
      title: "Расчёт трактора",
      text: lastText
    });
  } else {
    navigator.clipboard.writeText(lastText);
    alert("Скопировано!");
  }
}
</script>

</body>
</html>
